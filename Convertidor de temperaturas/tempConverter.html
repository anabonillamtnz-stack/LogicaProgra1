<!DOCTYPE html>
<html lang="es">
<body>
  <div class="container">
    <center><h2>Convertidor de temperaturas</h2>
    
    <label >Selecciona la conversión:</label>
    <select id="opcion">
        <option value="1">Celsius a Fahrenheit</option>
        <option value="2">Fahrenheit a Celsius</option>
        <option value="3">Celsius a Kelvin</option>
        <option value="4">Kelvin a Celsius</option>

    <label >Cantidad a convertir:</label>

    <h3 id="resultado">Resultado: - </h3>
</div></center>
